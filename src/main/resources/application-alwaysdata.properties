# AlwaysData-based profile (legacy), now also env-driving
spring.profiles.active=production

# Database Configuration (fallback to legacy, use DATABASE_URL in host hooks)
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://mysql-brisapets.alwaysdata.net:3306/brisapets_db}
spring.datasource.username=${DATABASE_USER:brisapets}
spring.datasource.password=${DATABASE_PASSWORD:M4rc3ll3@@sal3s}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.mariadb.jdbc.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MariaDBDialect}

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Security Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:https://brisapets.pt}/login/oauth2/code/{registrationId}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.brisapets=INFO
logging.level.org.springframework.security=WARN