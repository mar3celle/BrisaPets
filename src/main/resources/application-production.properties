# Production configuration for any hosting provider
# Database (MySQL/MariaDB/PostgreSQL) by environment variables
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://mysql-brisapets.alwaysdata.net:3306/brisapets_db}
spring.datasource.username=${DATABASE_USER:brisapets}
spring.datasource.password=${DATABASE_PASSWORD:M4rc3ll3@@sal3s}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.mariadb.jdbc.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MariaDBDialect}

# HikariCP pool settings (optional)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION_THRESHOLD:60000}

# Server configuration
override: server.port will be read from env supports internally if your host provides
server.port=${PORT:8080}
server.servlet.context-path=/

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
debug=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.boot.autoconfigure=WARN

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:https://brisapets.pt}/login/oauth2/code/{registrationId}