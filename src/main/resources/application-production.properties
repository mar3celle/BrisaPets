# AlwaysData MariaDB Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://mysql-brisapets.alwaysdata.net:3306/brisapets_db}
spring.datasource.username=${DATABASE_USER:brisapets}
spring.datasource.password=${DATABASE_PASSWORD:M4rc3ll3@@sal3s}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate for MariaDB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=false

# MariaDB Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Configurações para produção
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.boot.autoconfigure=WARN
debug=false

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=https://brisapets.alwaysdata.net/login/oauth2/code/{registrationId}